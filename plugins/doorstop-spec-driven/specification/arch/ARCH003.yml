text: |
  ## コンポーネント構成

  ```mermaid
  graph TD
    SERVE[serve_mcp.py<br/>FastMCP stdio サーバー] --> DT[doorstop_tools.py<br/>CRUD ツール]
    SERVE --> TT[trace_tools.py<br/>照会ツール]
    SERVE --> VT[validate_tools.py<br/>バリデーション]
    SERVE --> IT[impact_tools.py<br/>影響分析]
    SERVE --> BT[baseline_tools.py<br/>ベースライン]
    SERVE --> GT[glossary_tools.py<br/>用語辞書]
    SERVE --> INT[init_tools.py<br/>初期化]
    DT --> ADAPT[_adapter.py<br/>CLI→MCP 適応層]
    TT --> ADAPT
    VT --> ADAPT
    IT --> ADAPT
    BT --> ADAPT
    GT --> ADAPT
    INT --> ADAPT
    ADAPT --> CORE[Core Layer<br/>cmd_* 関数]
  ```

  ## コンポーネント責務

  | コンポーネント | 責務 | 主要機能 |
  |---|---|---|
  | serve_mcp.py | FastMCP サーバーエントリーポイント（stdio） | サーバー起動・ツール登録 |
  | _adapter.py | CLI 出力→dict 変換、ツリーキャッシュ管理 | call_cmd(), call_cmd_write(), get_tree() |
  | doorstop_tools.py | CRUD・ライフサイクル・レビューツール定義 | sdd_add_item, sdd_update_item 等 |
  | trace_tools.py | 照会・品質メトリクスツール定義 | sdd_chain, sdd_status, sdd_coverage 等 |
  | validate_tools.py | バリデーションツール定義 | sdd_validate |
  | impact_tools.py | 影響分析ツール定義 | sdd_impact |
  | baseline_tools.py | ベースラインツール定義 | sdd_baseline_create, sdd_baseline_diff 等 |
  | glossary_tools.py | 用語辞書ツール定義 | sdd_glossary_add, sdd_glossary_check 等 |
  | init_tools.py | 初期化ツール定義 | sdd_init |

  ## データフロー

  ```mermaid
  sequenceDiagram
    participant Tool as *_tools.py
    participant Adapt as _adapter.py
    participant Cache as Tree Cache
    participant Cmd as cmd_* 関数
    participant Stdout as stdout

    Tool->>Adapt: call_cmd(cmd_func, project_dir, args)
    Adapt->>Cache: get_tree(project_dir)
    alt キャッシュヒット
      Cache-->>Adapt: cached tree
    else キャッシュミス
      Adapt->>Adapt: doorstop.build()
      Adapt->>Cache: store(project_dir, tree)
    end
    Adapt->>Adapt: redirect stdout to StringIO
    Adapt->>Cmd: cmd_func(tree, Namespace(**args))
    Cmd->>Stdout: out(result_dict) + sys.exit(0)
    Adapt->>Adapt: catch SystemExit, parse JSON
    Adapt-->>Tool: parsed dict
  ```

  ## 設計根拠

  ### 駆動要因

  - **CLI/MCP 二重対応**: コア関数は out() + sys.exit() で CLI として動作する
    → アダプタ層で stdout キャプチャ + SystemExit キャッチにより MCP 互換に変換
  - **性能**: 複数ツール呼び出しで doorstop.build() を繰り返さない
    → ツリーキャッシュ（dict ベース）を導入

  ### なぜアダプタ層か

  コア関数を MCP 用に書き換えるのではなく、アダプタ層で出力パターンを変換する。

  - **コア関数の無修正**: CLI としての動作を維持。テストも変更不要
  - **一貫したエラーハンドリング**: SystemExit を {"ok": false, "error": ...} に変換
  - **キャッシュ制御の集約**: 読み取り（call_cmd）はキャッシュ活用、書き込み（call_cmd_write）はキャッシュ無効化

  ### IF 方針

  - 全ツール関数は `project_dir` を第1引数に取る
  - レスポンスは `{"ok": bool, ...}` 形式で統一
  - エラー時は `{"ok": false, "error": str}` を返す
