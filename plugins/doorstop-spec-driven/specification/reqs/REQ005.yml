text: |
  ## 概要

  ドキュメントツリーの整合性を検証し、問題を報告できること。

  ## 背景・動機

  Doorstop の組み込みバリデーションはリンクの基本的な整合性のみを検証するが、
  SDD ワークフローではより高度な検証が必要である。
  クロスグループリンクの警告、IMPL/TST の references ファイル存在チェック、
  derived アイテムの矛盾検出など、仕様品質を保証するための
  追加バリデーションルールを提供する。

  ## 受入基準

  - ツリー構造の整合性（親ドキュメント存在）を検証できる
  - リンクの完全性（孤立した子アイテム）を検出できる
  - クロスグループリンクを警告できる
  - IMPL/TST の references ファイル存在を検証できる
  - derived アイテムの矛盾を検出できる（IMPL/TST での使用禁止、派生根拠の有無）
  - --strict モードで警告をエラーとして扱える

  ## スコープ外

  - 仕様テキストの意味的な検証（自然言語の品質チェック等）は対象外
