text: |
  ## 概要

  全モジュールが共有するユーティリティ（ツリー読み込み、アイテム検索、
  出力フォーマッタ等）を提供すること。

  ## 背景・動機

  CRUD・照会・検証・影響分析の各モジュールは、Doorstop ツリーの読み込み、
  UID によるアイテム検索、JSON 出力フォーマットなど共通の処理を必要とする。
  これらを共通ユーティリティとして集約し、DRY 原則に従った一貫性のある
  実装基盤を提供する。

  ## 受入基準

  - Doorstop ツリーの安全な読み込みができる
  - UID によるアイテム検索ができる（アクティブ/非アクティブの切り替え可能）
  - アイテムを JSON シリアライズ可能な dict に変換できる
  - JSON / テキスト出力のフォーマットを統一できる
  - リンクインデックス（上流・下流の双方向マップ）を構築できる

  ## 制約事項

  - Doorstop API の互換性を維持する（doorstop.build() ラッパー）
  - out() 関数は JSON 出力 + sys.exit(0) パターンを採用する（MCP アダプタとの互換性）
