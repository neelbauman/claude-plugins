text: |
  ## 概要

  アイテムの活性化・非活性化（ソフトデリート）をチェーン全体に渡って実行できること。
  レビュー・クリア操作もチェーン単位で一括実行できること。

  ## 背景・動機

  SDD では要件の廃止や機能削除時に、関連する設計・実装・テスト仕様も連動して
  非活性化する必要がある。物理削除ではなくソフトデリートとすることで、
  トレーサビリティの履歴を保持しつつ、現行仕様から除外できる。
  また、仕様変更後の suspect 解消やレビュー承認をチェーン単位で
  一括処理することで、運用効率を向上させる。

  ## 受入基準

  - 単一アイテムの activate / deactivate ができる
  - チェーン全体の activate / deactivate ができる（下流アイテムを含む）
  - 単一アイテムの review / clear ができる
  - チェーン全体の review / clear が一括実行できる

  ## 制約事項

  - チェーン操作の深さは最大 10 階層に制限する（無限ループ防止）
  - チェーン非活性化時、他のアクティブな親を持つアイテムはスキップする（--force で強制可能）
