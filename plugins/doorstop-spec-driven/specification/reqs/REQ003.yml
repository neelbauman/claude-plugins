text: |
  ## 概要

  要件からテストまでのトレーサビリティチェーンを照会し、
  プロジェクトの状態を多角的に把握できること。

  ## 背景・動機

  トレーサビリティは SDD の根幹的価値である。要件がどの設計で実現され、
  どの実装とテストで検証されているかを即座に把握できることで、
  変更影響の見落としを防ぎ、仕様の網羅性を保証する。
  Claude Code エージェントが実装・テスト作業時にコンテキストを取得するためにも、
  チェーン照会と逆引きの機能が不可欠である。

  ## 受入基準

  - アイテムの上流・下流チェーンを表示できる
  - アイテムの全文脈（チェーン上のすべてのアイテム詳細）を取得できる
  - ファイルパスからの逆引き（関連アイテム検索）ができる
  - プロジェクト全体のステータスサマリを表示できる
  - ドキュメント・グループ一覧を表示できる
  - UID による個別アイテム検索ができる

  ## スコープ外

  - トレーサビリティのグラフ可視化は REQ011（レポート・ダッシュボード）で扱う
