text: |
  ## 概要

  プロジェクト固有のドメイン用語を管理し、仕様内の用語一貫性を検証できること。

  ## 背景・動機

  仕様書内で同じ概念に異なる用語（エイリアス）が使われると、
  読み手の混乱や誤解を招く。用語辞書で正式名称とエイリアスを定義し、
  仕様テキスト内のエイリアス使用を検出することで、用語の一貫性を保証する。

  ## 受入基準

  - 用語の追加・更新・削除ができる（YAML ファイルで永続化）
  - 用語一覧を表示できる
  - 仕様テキスト内の用語使用状況をチェックできる（エイリアス使用の検出）
  - 未使用用語を検出できる

  ## スコープ外

  - 自然言語処理による用語の自動抽出・推薦は対象外
