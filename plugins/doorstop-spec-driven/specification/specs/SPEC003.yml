gherkin: |
  Scenario: チェーン非活性化
    Given REQ001 → SPEC001 → IMPL001 のチェーンが存在する
    When deactivate-chain REQ001 を実行する
    Then REQ001, SPEC001, IMPL001 すべてが active=False になる

  Scenario: 複数親を持つアイテムのスキップ
    Given IMPL001 が SPEC001 と SPEC002 の両方にリンクされている
    And SPEC002 はアクティブである
    When deactivate-chain SPEC001 を実行する
    Then IMPL001 はスキップされる（他のアクティブな親が存在するため）

  Scenario: --force によるチェーン非活性化
    Given IMPL001 が SPEC001 と SPEC002 の両方にリンクされている
    When deactivate-chain --force SPEC001 を実行する
    Then IMPL001 も非活性化される

  Scenario: チェーン活性化
    Given 非活性な REQ001 → SPEC001 → IMPL001 のチェーンが存在する
    When activate-chain REQ001 を実行する
    Then REQ001, SPEC001, IMPL001 すべてが active=True になる
