text: |
  ## インターフェース

  ```python
  cmd_add(tree, args)
  # args: document, text, header, group, level, insert,
  #       references(JSON), priority, test_level,
  #       non_normative, derived, gherkin, links(UID list)

  cmd_update(tree, args)
  # args: uid, text, header, group, priority, test_level,
  #       gherkin, references, set_normative, set_non_normative

  cmd_reorder(tree, args)
  # args: uid, level
  ```

  ## 振る舞い

  ### cmd_add

  1. 指定ドキュメントから doc を取得する
  2. `doc.add_item()` で新規アイテムを作成する
  3. text, header, group（リスト型）, priority 等の属性を設定する
  4. references は JSON 文字列をパースして設定する
  5. links が指定された場合、各 UID に対して `item.link()` を実行する
  6. リンク追加後に `item.clear(link_uids)` で stamp を初期化する（suspect 防止）
  7. `item.save()` で永続化する

  ### cmd_update

  1. UID でアイテムを検索する
  2. 値が None でない属性のみ上書きする（部分更新）
  3. `set_normative` / `set_non_normative` フラグで normative 属性を切り替える
  4. `item.save()` で永続化する

  ### cmd_reorder

  1. UID でアイテムを検索する
  2. `item.level` を新しい値に設定する
  3. `doc.reorder(automatic=True, keep=item)` で自動再配置する

  ## パラメータ詳細

  | パラメータ | 対象 | 説明 |
  |---|---|---|
  | `document` | add | 対象ドキュメント（REQ, SPEC 等） |
  | `text` | add/update | アイテム本文（Markdown） |
  | `header` | add/update | 短い見出し |
  | `group` | add/update | グループ名（リスト型） |
  | `priority` | add/update | `critical` / `high` / `medium` / `low` / `none` / `done` |
  | `references` | add/update | JSON 文字列 `[{"path":"...","type":"file"}]` |
  | `gherkin` | add/update | BDD シナリオ（Given/When/Then） |
  | `links` | add | リンク先 UID のリスト |
  | `non_normative` | add | true で normative=false を設定 |
  | `derived` | add | true で derived=true を設定 |

  ## エラーハンドリング

  - UID が存在しない → `{"ok": false, "error": "Item not found: UID"}`
  - priority が不正値 → `{"ok": false, "error": "Invalid priority"}`
  - ドキュメントが存在しない → `{"ok": false, "error": "Document not found"}`
