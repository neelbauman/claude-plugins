gherkin: |
  Scenario: アイテム追加
    Given Doorstop ツリーが存在する
    When add コマンドを text, header, group, priority 付きで実行する
    Then 新しいアイテムが指定ドキュメントに作成される
    And 指定された属性がすべて設定される

  Scenario: アイテム更新（部分更新）
    Given 既存アイテム REQ001 が存在する
    When update コマンドで priority のみを high に変更する
    Then REQ001 の priority が high に更新される
    And 他の属性は変更されない

  Scenario: リンク付きアイテム追加
    Given REQ001 が存在する
    When add コマンドを links=REQ001 付きで実行する
    Then 新しいアイテムが作成される
    And REQ001 へのリンクが追加される
    And リンクの stamp が初期化される（suspect にならない）

  Scenario: アイテム並べ替え
    Given REQ001 が level 1.0 である
    When reorder コマンドで level を 2.0 に変更する
    Then REQ001 の level が 2.0 に変更される
