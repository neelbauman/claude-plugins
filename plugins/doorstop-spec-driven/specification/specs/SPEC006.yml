gherkin: |
  Scenario: UID によるチェーン照会
    Given REQ001 → SPEC001 → IMPL001 のチェーンが存在する
    When chain --uid SPEC001 を実行する
    Then 上流に REQ001、下流に IMPL001 が表示される

  Scenario: ファイル逆引き
    Given IMPL001 が references に "src/module.py" を持つ
    When chain --file src/module.py を実行する
    Then IMPL001 とその上流チェーン全体が表示される

  Scenario: ファイル逆引き（サフィックス一致）
    Given IMPL001 が references に "src/core/module.py" を持つ
    When chain --file module.py を実行する
    Then IMPL001 がサフィックス一致で検出される

  Scenario: コンテキスト取得
    Given SPEC001 にリンクされた上流・下流アイテムが存在する
    When context SPEC001 を実行する
    Then target, upstream, downstream, related_files, health が返される
