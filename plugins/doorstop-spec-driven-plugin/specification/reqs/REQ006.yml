text: |
  ## 概要

  仕様のスナップショット（ベースライン）を作成・一覧・差分比較できること。
  リリース時点の仕様状態を記録する。

  ## 背景・動機

  リリースやマイルストーンの時点で仕様の状態を凍結し、
  以降の変更を追跡可能にする。ベースライン間の差分比較により、
  「前回リリースから何が変わったか」を定量的に把握できる。

  ## 受入基準

  - 名前付きベースラインを作成できる（アクティブアイテムの UID、ヘッダー、グループ、優先度、テキストスニペットを保存）
  - ベースライン一覧を表示できる
  - 2つのベースライン間、またはベースラインと現在の状態の差分を表示できる
  - ベースライン作成時に Git コミットハッシュとタグを記録できる

  ## 制約事項

  - ベースラインは JSON ファイルとして `.baselines/` ディレクトリに保存する
  - テキストはスニペット（先頭80文字）のみ保存する

  ## スコープ外

  - 分散ベースライン管理（複数リポジトリ間の同期等）は対象外
