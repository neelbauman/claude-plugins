text: |
  ## 概要

  カバレッジ、suspect、gaps（リンク欠落）を計算し、
  仕様の品質状態を定量的に把握できること。
  属性フィルタ付きの高機能検索ができること。

  ## 背景・動機

  SDD プロジェクトの品質を定量的に評価することで、
  レビュー優先度の判断やリリース判定の根拠を提供する。
  カバレッジは「設計が実装・テストでどの程度カバーされているか」を示し、
  suspect は「親の変更に追随していない子アイテム」を検出する。
  これらのメトリクスが SDD のレビューワークフローを駆動する。

  ## 受入基準

  - SPEC に対する IMPL/TST のカバレッジ率を算出できる
  - suspect（親変更による整合性問題）を検出・一覧できる
  - gaps（リンク欠落アイテム）を検出できる
  - 優先度順のバックログを表示できる
  - 属性フィルタ（グループ、優先度、テキスト等）による検索ができる

  ## 制約事項

  - カバレッジは SPEC を基準とした子ドキュメント（IMPL/TST）のリンク有無で算出する
