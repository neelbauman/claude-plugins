text: |
  ## 概要

  Doorstop アイテムの作成・更新・並べ替え・リンク管理・アンリンクを
  統一的なプログラマティック API で実行できること。

  ## 背景・動機

  仕様駆動開発（SDD）では、Claude Code エージェントが仕様策定から実装・テストまでの
  全サイクルで Doorstop アイテムを操作する。手動の doorstop CLI では
  エージェントワークフローに組み込めないため、MCP ツールとして呼び出せる
  統一的な CRUD インターフェースが必要である。

  ## 受入基準

  - アイテムの追加時に text、header、group、priority、gherkin、references、リンク等を指定できる
  - 既存アイテムの属性を部分的に更新できる（変更のない属性は保持される）
  - アイテムのレベル（表示順序）を変更できる
  - 子→親のリンクを追加・削除できる
  - 非規範的アイテム（normative: false）、派生要求（derived: true）を作成できる

  ## 制約事項

  - Doorstop API の制約により、リンクの方向は常に子→親である
  - references は JSON 文字列形式（`[{"path":"...","type":"file"}]`）で指定する
  - priority は `critical` / `high` / `medium` / `low` / `none` / `done` のいずれか
