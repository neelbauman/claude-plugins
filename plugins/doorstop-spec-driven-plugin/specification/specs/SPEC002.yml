text: |
  ## インターフェース

  ```python
  cmd_link(tree, args)    # args: child_uid, parent_uid
  cmd_unlink(tree, args)  # args: child_uid, parent_uid
  ```

  ## 振る舞い

  ### cmd_link

  1. child_uid と parent_uid の両方のアイテムを検索する
  2. `item.link(parent_uid)` でリンクを作成する
  3. `item.clear([parent_uid])` で stamp を初期化する（suspect 防止）
  4. `item.save()` で永続化する

  ### cmd_unlink

  1. child_uid と parent_uid の両方のアイテムを検索する
  2. `item.unlink(parent_uid)` でリンクを削除する
  3. `item.save()` で永続化する

  ## エラーハンドリング

  - child_uid または parent_uid が存在しない → エラー
  - 既に存在するリンクの重複追加 → Doorstop API の挙動に依存
