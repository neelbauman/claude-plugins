    And リンクの stamp が初期化される

  Scenario: リンク削除
    Given SPEC001 が REQ001 にリンクされている
    When unlink SPEC001 REQ001 を実行する
    Then SPEC001 の links から REQ001 が削除される

  Scenario: 存在しない UID へのリンク
    Given SPEC001 が存在する
    When link SPEC001 INVALID_UID を実行する
    Then エラーが返される
